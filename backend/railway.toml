# railway.toml - Social Emblue AI backend
# Railway service root directory should be set to: backend

[build]
builder = "NIXPACKS"
buildCommand = "npm ci && npx prisma generate && npm run build"

[deploy]
preDeployCommand = "npx prisma migrate deploy"
startCommand = "npm start"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "social-emblue-api"

# Environment variables are set in Railway -> Variables.
# Do not put real secret values in this file.
#
# Required at launch:
#   NODE_ENV, FRONTEND_URL, API_BASE_URL, ENABLE_SWAGGER
#   ANTHROPIC_API_KEY
#   DATABASE_URL, REDIS_URL
#   SUPABASE_URL, SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY, SUPABASE_JWKS_URL
#   SUPERADMIN_EMAILS, SUPER_ADMIN_EMAIL, SUPER_ADMIN_PASSWORD, OAUTH_STATE_SECRET
#   RESEND_API_KEY, EMAIL_FROM
#   APIFY_API_TOKEN
#   LINK_BASE_URL
